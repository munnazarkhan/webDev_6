<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Cravings</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar navbar-expand-lg navbar-cravings sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4 d-flex align-items-center gap-2" href="index.html">
        <i class="bi bi-fire"></i> Cravings
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-3 gap-1">
          <li class="nav-item"><a class="nav-link" href="./index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="./login.html">About</a></li>
          <!-- <li class="nav-item"><a class="nav-link" href="order-now.html">Order Now</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li> -->
        </ul>
        <div class="d-flex align-items-center gap-3">
          <a href="login.html" class="text-white fw-500">Login</a>
          <a href="register.html" class="btn-register">Register</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- ===== TWO-COLUMN AUTH ===== -->
  <div class="row g-0" style="min-height:calc(100vh - 64px);">

    <!-- Left Deco (hidden on mobile) -->
    <div class="col-lg-5 d-none d-lg-flex auth-deco">
      <div>
        <i class="bi bi-fire display-3 mb-4 d-block" style="color:rgba(255,255,255,0.25);"></i>
        <h2 class="fw-800 mb-3" style="font-weight:800;">Welcome Back!</h2>
        <p class="opacity-85">Great to see you again. Log in to continue ordering amazing food from your favourite restaurants.</p>
      </div>
    </div>

    <!-- Right Form -->
    <div class="col-12 col-lg-7 auth-form-col">
      <div class="auth-form-wrap">
        <h3 class="fw-800 mb-1" style="font-weight:800;">Log In</h3>
        <p class="text-secondary mb-4">Don't have an account? <a href="register.html" style="color:var(--color-primary);font-weight:600;">Register</a></p>

        <div class="mb-3">
          <label class="form-label small fw-600">Email</label>
          <input type="email" class="form-control" placeholder="atif@example.com" />
        </div>
        <div class="mb-3">
          <label class="form-label small fw-600">Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-control pe-5" placeholder="••••••••" />
            <i class="bi bi-eye eye-icon"></i>
          </div>
        </div>
        <div class="mb-4 d-flex align-items-center">
          <input class="form-check-input me-2" type="checkbox" id="rememberMe" />
          <label class="form-check-label small" for="rememberMe">Remember me</label>
        </div>
        <button class="btn w-100 btn-primary-cravings py-2">Login</button>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
