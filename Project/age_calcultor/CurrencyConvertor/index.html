<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Exchange Calculator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="container">
        <h1>Currency Exchange Calculator</h1>

        <div class="currency-calculator">

            <input type="number" id="amount" placeholder="Enter amount" />

            <div class="currency-box">

              
                <div class="currency-select">
                    <img
                        id="fromFlag"
                        src="https://flagsapi.com/US/flat/64.png"
                        alt="flag"
                    />

                    <select id="fromCurrency">
                        <option value="USD" data-country="US">USD - US Dollar</option>
                        <option value="EUR" data-country="EU">EUR - Euro</option>
                        <option value="GBP" data-country="GB">GBP - British Pound</option>
                        <option value="INR" data-country="IN">INR - Indian Rupee</option>
                        <option value="AUD" data-country="AU">AUD - Australian Dollar</option>
                        <option value="CAD" data-country="CA">CAD - Canadian Dollar</option>
                        <option value="SGD" data-country="SG">SGD - Singapore Dollar</option>
                        <option value="JPY" data-country="JP">JPY - Japanese Yen</option>
                        <option value="CNY" data-country="CN">CNY - Chinese Yuan</option>
                      
                    </select>
                </div>

                <span class="to-text">to</span>

                <div class="currency-select">
                    <img
                        id="toFlag"
                        src="https://flagsapi.com/IN/flat/64.png"
                        alt="flag"
                    />

                    <select id="toCurrency">
                        <option value="USD" data-country="US">USD - US Dollar</option>
                        <option value="EUR" data-country="EU">EUR - Euro</option>
                        <option value="GBP" data-country="GB">GBP - British Pound</option>
                        <option value="INR" data-country="IN" selected>INR - Indian Rupee</option>
                        <option value="AUD" data-country="AU">AUD - Australian Dollar</option>
                        <option value="CAD" data-country="CA">CAD - Canadian Dollar</option>
                        <option value="SGD" data-country="SG">SGD - Singapore Dollar</option>
                        <option value="JPY" data-country="JP">JPY - Japanese Yen</option>
                        <option value="CNY" data-country="CN">CNY - Chinese Yuan</option>
                      
                    </select>
                </div>

            </div>

            <button id="convert">Convert</button>
            
            <div class="result-section">
                <p id="result">Converted amount will appear here</p>
            </div>

        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
