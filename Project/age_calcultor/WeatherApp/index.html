<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Weather App</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header class="text-center text-white py-4">
    <h1>
      <i class="bi bi-cloud-sun-fill"></i>
      Weather App
    </h1>
  </header>

  <main class="flex-grow-1 d-flex justify-content-center align-items-center">

    <div class="weather-card text-center">

      <div class="input-group mb-4 search-box">

        <input
          type="text"
          id="cityName"
          class="form-control"
          placeholder="Enter city name"
        />

        <button class="btn btn-dark" onclick="getWeather()">
          <i class="bi bi-search"></i>
        </button>

      </div>

      <div>

        <i class="bi bi-cloud-sun-fill weather-icon"></i>

        <div class="temp mt-3">
          <span id="Temperature">30</span>°C
        </div>

        <div class="city mt-2" id="City">
          Bhopal
        </div>

        <p class="fs-5" id="Condition">
          Sunny
        </p>

      </div>

      <div class="row details g-3">

        <div class="col-6">
          <div class="detail-box">

            <i class="bi bi-droplet-half fs-3"></i>

            <h6 class="mt-2">Humidity</h6>

            <p id="Humidity">60%</p>

          </div>
        </div>

        <div class="col-6">
          <div class="detail-box">

            <i class="bi bi-wind fs-3"></i>

            <h6 class="mt-2">Wind</h6>

            <p id="Wind">12 km/h</p>

          </div>
        </div>

      </div>

    </div>

  </main>

  <script src="script.js"></script>

</body>
</html>
