<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Cravings</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: "Inter", sans-serif;
      background: #0f0f0f;
    }

    /* Navbar */
    .navbar-cravings {
      background: #1c1c1c;
    }

    .navbar-cravings a {
      color: #fff;
      text-decoration: none;
    }

    /* Left side decoration */
    .auth-deco {
      background: linear-gradient(135deg, #ff6b00, #ff3c00);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }

    /* Right side form */
    .auth-form-col {
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .auth-form-wrap {
      width: 100%;
      max-width: 420px;
    }

    /* Inputs */
    .form-control {
      border-radius: 10px;
      padding: 10px 12px;
    }

    .form-control:focus {
      box-shadow: 0 0 0 3px rgba(255,107,0,0.15);
      border-color: #ff6b00;
    }

    /* Button */
    .btn-primary-cravings {
      background: #ff6b00;
      color: #fff;
      border-radius: 10px;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-primary-cravings:hover {
      background: #e85c00;
      transform: translateY(-2px);
    }

    /* Password eye */
    .password-wrapper {
      position: relative;
    }

    .eye-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #888;
    }

    /* Register link */
    a {
      text-decoration: none;
    }

    a:hover {
      color: #ff6b00;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-cravings sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold fs-4 d-flex align-items-center gap-2" href="index.html">
      <i class="bi bi-fire"></i> Cravings
    </a>

    <button class="navbar-toggler text-white" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav me-auto ms-3">
        <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="order-now.html">Order Now</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="contact.html">Contact</a></li>
      </ul>

      <div class="d-flex gap-3">
        <a href="login.html" class="text-white">Login</a>
        <a href="register.html" class="btn btn-warning btn-sm rounded-pill px-3">Register</a>
      </div>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="row g-0" style="min-height: calc(100vh - 70px);">

  <!-- LEFT SIDE -->
  <div class="col-lg-5 d-none d-lg-flex auth-deco text-center">
    <div>
      <i class="bi bi-fire display-3 mb-4"></i>
      <h2 class="fw-bold">Welcome Back!</h2>
      <p class="mt-3 opacity-75">
        Log in to continue ordering your favorite meals from top restaurants.
      </p>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="col-12 col-lg-7 auth-form-col">

    <div class="auth-form-wrap">

      <h3 class="fw-bold mb-2">Log In</h3>
      <p class="text-muted mb-4">
        New here?
        <a href="register.html" style="color:#ff6b00;font-weight:600;">Create account</a>
      </p>

      <!-- EMAIL -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" class="form-control" placeholder="jane@example.com" />
      </div>

      <!-- PASSWORD -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>

        <div class="password-wrapper">
          <input type="password" class="form-control" placeholder="Enter password" />
          <i class="bi bi-eye eye-icon"></i>
        </div>
      </div>

      <!-- REMEMBER -->
      <div class="mb-4 form-check">
        <input class="form-check-input" type="checkbox" id="remember" />
        <label class="form-check-label" for="remember">Remember me</label>
      </div>

      <!-- BUTTON -->
      <button class="btn btn-primary-cravings w-100 py-2">
        Login
      </button>

    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
