<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Cravings</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar navbar-expand-lg navbar-cravings sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4 d-flex align-items-center gap-2" href="index.html">
        <i class="bi bi-fire"></i> Cravings
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-3 gap-1">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="order-now.html">Order Now</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
        <div class="d-flex align-items-center gap-3">
          <a href="login.html" class="text-white fw-500">Login</a>
          <a href="register.html" class="btn-register">Register</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- ===== TWO-COLUMN AUTH (flipped) ===== -->
  <div class="row g-0" style="min-height:calc(100vh - 64px);">

    <!-- Left Form -->
    <div class="col-12 col-lg-7 auth-form-col">
      <div class="auth-form-wrap">
        <h3 class="fw-800 mb-1" style="font-weight:800;">Create Account</h3>
        <p class="text-secondary mb-4">Already have an account? <a href="login.html" style="color:var(--color-primary);font-weight:600;">Login</a></p>

        <!-- User Type Selector -->
        <div class="user-type-selector mb-4">
          <button class="active" onclick="setActive(this)">Customer</button>
          <button onclick="setActive(this)">Restaurant</button>
          <button onclick="setActive(this)">Rider</button>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-600">Full Name</label>
          <input type="text" class="form-control" placeholder="Jane Doe" />
        </div>
        <div class="mb-3">
          <label class="form-label small fw-600">Email</label>
          <input type="email" class="form-control" placeholder="jane@example.com" />
        </div>
        <div class="mb-3">
          <label class="form-label small fw-600">Phone Number</label>
          <input type="tel" class="form-control" placeholder="+91 00000 00000" />
        </div>
        <div class="mb-3">
          <label class="form-label small fw-600">Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-control pe-5" placeholder="••••••••" />
            <i class="bi bi-eye eye-icon"></i>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-600">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-control pe-5" placeholder="••••••••" />
            <i class="bi bi-eye eye-icon"></i>
          </div>
        </div>
        <div class="mb-4 d-flex align-items-start gap-2">
          <input class="form-check-input mt-1 flex-shrink-0" type="checkbox" id="terms" />
          <label class="form-check-label small" for="terms">
            I agree to the <a href="terms-of-service.html" style="color:var(--color-primary);">Terms and Conditions</a>
          </label>
        </div>
        <button class="btn w-100 btn-primary-cravings py-2">Create Account</button>
      </div>
    </div>

    <!-- Right Deco (hidden on mobile) -->
    <div class="col-lg-5 d-none d-lg-flex auth-deco">
      <div>
        <i class="bi bi-people-fill display-3 mb-4 d-block" style="color:rgba(255,255,255,0.25);"></i>
        <h2 class="fw-800 mb-3" style="font-weight:800;">Join Cravings Today!</h2>
        <p class="opacity-85">Whether you're a hungry customer, a restaurant owner, or a rider looking for flexible work — there's a place for you at Cravings.</p>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function setActive(btn) {
      btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>
</body>
</html>
